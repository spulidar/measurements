  <style>  
    /* Global Font & Background */
    body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; color: #333; margin: 0; padding: 10px; background: transparent; }

    /* ==================================================
       BUG FIX: PREVENT JUMPING/OVERLAPPING YEARS
       ================================================== */
    .calendar-header * { transition: none !important; animation: none !important; }
    
    /* Calendar Wrapper (Original light borders) */
    .calendar { background: #ffffff; border-radius: 4px; border: 1px solid #ddd; overflow: hidden; }

    /* ==================================================
       CONTEXTUAL POPOVER (FLOATING MENU)
       ================================================== */
    .popover-menu {
        position: absolute;
        display: none; 
        background: #ffffff;
        padding: 6px 10px;
        border-radius: 30px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        border: 1px solid #e0e0e0;
        z-index: 1000;
        flex-direction: row;
        gap: 8px;
        animation: pop 0.15s ease-out;
    }

    /* Downward pointing arrow */
    .popover-menu::after {
        content: ''; position: absolute; bottom: -6px; left: 50%; margin-left: -6px;
        border-width: 6px 6px 0; border-style: solid; border-color: #ffffff transparent transparent transparent;
    }
    .popover-menu::before {
        content: ''; position: absolute; bottom: -7px; left: 50%; margin-left: -7px;
        border-width: 7px 7px 0; border-style: solid; border-color: #d0d0d0 transparent transparent transparent;
    }

    @keyframes pop {
        from { opacity: 0; transform: translateY(5px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* AM/PM/NT Mini Buttons */
    .mini-btn {
        background: #f0f2f5;
        border: 1px solid transparent;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 700;
        color: #444;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 4px;
        font-family: monospace;
    }
    .mini-btn:hover { background: #0056b3; color: white; border-color: #004085; transform: translateY(-1px); }
  </style> 
</head>

var daysWithMeasurements = {};
myDataSource.forEach(function(eventItem) {
    var currentDay = new Date(eventItem.startDate);
    var endDate = new Date(eventItem.endDate);
    currentDay.setHours(0,0,0,0);
    endDate.setHours(23,59,59,999);
    
    while(currentDay <= endDate) {
        var formattedDate = currentDay.getFullYear() + '-' + currentDay.getMonth() + '-' + currentDay.getDate();
        daysWithMeasurements[formattedDate] = true;
        currentDay.setDate(currentDay.getDate() + 1); 
    }
});

new Calendar('#calendar', {
    minDate: new Date('01/01/2017'),
    maxDate: new Date('12/31/2026'),
    style: 'background',
    dataSource: myDataSource,
    
    customDayRenderer: function(element, date) {
        var formattedDate = date.getFullYear() + '-' + date.getMonth() + '-' + date.getDate();
        if (!daysWithMeasurements[formattedDate]) {
            element.style.color = '#d3d3d3'; 
            element.style.cursor = 'default';
        } else {
            element.style.cursor = 'pointer';
            element.style.fontWeight = 'bold';
            element.style.color = '#333333';
        }
    },
    
    clickDay: function(e) {
        if(e.events.length > 0) {
            var githubBaseUrl = 'https://spulidar.github.io/measurements/';
            var popover = document.getElementById('mini-popover');
            
            // If single measurement, open directly and hide popover
            if (e.events.length === 1) {
                popover.style.display = 'none';
                window.open(githubBaseUrl + e.events[0].url, "_blank");
            } 
            // Multiple measurements: open pill menu
            else {
                popover.innerHTML = ''; 

                // 1. SMART CHRONOLOGICAL SORTING (AM -> PM -> NT)
                e.events.sort(function(a, b) {
                    var getPeriodWeight = function(url) {
                        if (url.includes("saam")) return 1;
                        if (url.includes("sapm")) return 2;
                        if (url.includes("sant")) return 3;
                        return 4; // Other
                    };
                    return getPeriodWeight(a.url) - getPeriodWeight(b.url);
                });

                // 2. CREATE MINI BUTTONS
                e.events.forEach(function(eventItem) {
                    var url = eventItem.url;
                    var label = "MIX";
                    var icon = "📌"; 
                    
                    if (url.includes("saam")) { label = "AM"; icon = "🌅"; }
                    if (url.includes("sapm")) { label = "PM"; icon = "☀️"; }
                    if (url.includes("sant")) { label = "NT"; icon = "🌙"; }

                    var btn = document.createElement('button');
                    btn.className = 'mini-btn';
                    btn.innerHTML = `${icon} ${label}`;
                    
                    btn.onclick = function(clickEvent) {
                        clickEvent.stopPropagation(); 
                        window.open(githubBaseUrl + url, "_blank"); 
                        popover.style.display = 'none'; 
                    };
                    popover.appendChild(btn);
                });

                // 3. CALCULATE POSITION (Above clicked day)
                popover.style.display = 'flex'; 
                
                var rect = e.element.getBoundingClientRect();
                var top = rect.top + window.scrollY - popover.offsetHeight - 12;
                var left = rect.left + window.scrollX + (rect.width / 2) - (popover.offsetWidth / 2);

                popover.style.top = top + 'px';
                popover.style.left = left + 'px';
            }
        }
    }
});

// Close Popover when clicking outside
document.addEventListener('click', function(event) {
    var popover = document.getElementById('mini-popover');
    if (popover.style.display === 'flex' && !event.target.closest('.day') && !event.target.closest('#mini-popover')) {
        popover.style.display = 'none';
    }
});
